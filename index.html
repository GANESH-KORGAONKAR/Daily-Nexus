<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Nexus</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="/favicon/DailyNexusIcon-removebg-preview.png" type="image/x-icon">
  </head>
  <body>

    <main>
      <aside class="sidebar">
        <h1>Daily Nexus</h1>
        <h2><input type="text" placeholder="user name"></h2>

        <div class="sub-sec ">
          <div class="part1">
            <h3>Day</h3>
            <h4>Date</h4>
            <h4>Time</h4>
          </div>
          <div class="part2">
            <h3>City</h3>
            <h4>Temperature</h4>
            <h4>weather</h4>
          </div>
        </div>

      </aside>

      <div class="row row1">
        <section class="quote box"><h1>Motivational quote</h1></section>
      <section class="goals box"><h1>Goals</h1></section>
      </div>

      <div class="row row2">
        <section class="todo box"><h1>Todo</h1></section>
        <section class="pomodoro box"><h1>Pomodoro</h1></section>
      </div>

      <div class="row row3">
        <section class="calendar box"><h1>Calendar</h1></section>
      <section class="focus box"><h1>Focus Task</h1></section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
